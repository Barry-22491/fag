{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="card border-0 shadow-sm">
  <div class="card-body">
    <h1 class="h4 mb-3">{{ title }}</h1>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}

      <button type="submit" class="btn btn-primary">Enregistrer</button>
      <a href="{% url 'bureau_liste' %}" class="btn btn-light">Annuler</a>
    </form>
  </div>
</div>
{% endblock %}
