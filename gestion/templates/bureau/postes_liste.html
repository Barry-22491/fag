{% extends "base.html" %}
{% block title %}Postes{% endblock %}

{% block content %}
<div class="card border-0 shadow-sm">
  <div class="card-body">
    <div class="d-flex justify-content-between mb-3">
      <h1 class="h4">Postes du bureau</h1>
      <a href="{% url 'poste_create' %}" class="btn btn-primary btn-sm">Ajouter</a>
    </div>

    <table class="table align-middle">
      <thead class="table-light">
        <tr>
          <th>Ordre</th>
          <th>Nom</th>
        </tr>
      </thead>
      <tbody>
        {% for poste in postes %}
        <tr>
          <td>{{ poste.ordre }}</td>
          <td>{{ poste.nom }}</td>
        </tr>
        {% empty %}
        <tr>
          <td colspan="2" class="text-muted text-center">Aucun poste.</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
